<div class="col-12 col-md-6 col-xl-4">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% for error in field.errors %}
        <div class="text-danger small mt-1">{{ error }}</div>
    {% endfor %}
    <div class="exchange-helper mt-2" data-exchange-rate-url="{% url 'exchange_rate_api' %}" data-target-input-id="{{ field.id_for_label }}">
        <div>
            <span class="exchange-label">参考レート</span>
            <strong data-role="exchange-rate-value">取得中...</strong>
            <small data-role="exchange-rate-meta">USD/JPY</small>
            {% if note %}
                <small class="exchange-note">{{ note }}</small>
            {% endif %}
        </div>
        <button class="btn btn-sm btn-outline-dark" type="button" data-role="apply-exchange-rate" disabled>使う</button>
    </div>
</div>
