{% extends "base.html" %}

{% block title %}ログイン - eBay Profit Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="card app-card">
            <div class="card-body p-4">
                <div class="eyebrow">Welcome back</div>
                <h1 class="h4 fw-bold mb-3">ログイン</h1>
                {% if form.errors %}
                    <div class="alert alert-danger">ユーザー名またはパスワードが正しくありません。</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">ユーザー名</label>
                        <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">パスワード</label>
                        <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
                    </div>
                    <button class="btn btn-primary-action w-100" type="submit">ログイン</button>
                </form>
                <p class="text-muted small mt-3 mb-0">初回ユーザーは管理画面用スーパーユーザーを作成してください。</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
